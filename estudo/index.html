<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando para /estudo</title>
  <script>
    (function () {
      const path = window.location.pathname;
      const base = path
        .replace(/\/estudo\/index\.html$/, "")
        .replace(/\/estudo\/?$/, "");
      window.location.replace(base + "/index.html?estudo=1");
    })();
  </script>
</head>
<body>
  <p>Redirecionando para a página de estudo...</p>
</body>
</html>
